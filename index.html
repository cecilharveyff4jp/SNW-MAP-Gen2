<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>同盟内マップ | SNW Map</title>
    <style>
      html, body { margin: 0; height: 100%; -webkit-text-size-adjust: 100%; overscroll-behavior: none; font-family: system-ui, sans-serif; }
      button, input, textarea, select { font-family: inherit; }
      *, *::before, *::after { box-sizing: border-box; }
      body { font-feature-settings: "palt"; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; color: #1f2630; }
      ::selection { background: var(--accent-soft, #e7f0fb); color: var(--accent-strong, #1b5fa8); }
      button { transition: filter .12s ease, background .12s ease, transform .09s cubic-bezier(.2,.8,.2,1), box-shadow .15s ease, border-color .12s ease; }
      button:not(:disabled):active { transform: scale(.96); filter: brightness(.9); }
      button:disabled { opacity: .55; }
      @media (hover: hover) { button:not(:disabled):hover { filter: brightness(.97); } }
      a { transition: color .12s ease; }
      input, textarea, select { transition: border-color .12s ease, box-shadow .15s ease; }
      input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent, #1c7ed6) !important; box-shadow: 0 0 0 3px var(--accent-soft, #e7f0fb); }
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-thumb { background: rgba(120,130,150,.32); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
      *::-webkit-scrollbar-thumb:hover { background: rgba(120,130,150,.5); background-clip: content-box; }
      * { scrollbar-width: thin; scrollbar-color: rgba(120,130,150,.4) transparent; }
      * { -webkit-tap-highlight-color: transparent; }
      body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
      input, textarea, select, [contenteditable="true"] { -webkit-touch-callout: default; -webkit-user-select: text; user-select: text; }
      img, canvas, button, a { -webkit-touch-callout: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
